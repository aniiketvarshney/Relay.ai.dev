name: GitAnalyzer
version: 1.0.0
description: Analyzes GitHub repositories and reads issues.
serverUrl: https://api.gitanalyzer.dev/v1
authType: none
domain: devtools
tools:
  - name: search_repos
    description: Search GitHub repos by keyword.
    endpoint: /repos/search
    method: POST
    inputSchema:
      type: object
      properties:
        keyword:
          type: string
        limit:
          type: number
